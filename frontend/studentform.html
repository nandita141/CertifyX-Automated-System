<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Generation Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Link to external CSS -->
  <link rel="stylesheet" href="css/studentform.css?v=2">
</head>

<body>

  <div class="container">

    <div class="header">

      <div class="logo-section">
        <img src="logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
      </div>
    </div>

    <form id="certificate-form" onsubmit="return false;">

      <!-- APPLICATION ID SECTION -->
      <div class="form-group">
        <label>APPLICATION ID</label>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="application_id" placeholder="Enter your ID (e.g. 2024001)" autocomplete="off">
          <button type="button" class="btn-verify" onclick="checkID()" style="width: auto; white-space: nowrap;">Verify
            ID</button>
        </div>
      </div>
      <div id="status" class="status-message"></div>

      <!-- HIDDEN FORM FIELDS -->
      <div id="form-fields" class="hidden">

        <!-- STUDENT NAME -->
        <div class="form-group">
          <label>STUDENT NAME</label>
          <input type="text" id="student_name" placeholder="Full Name">
        </div>

        <!-- SUPERVISOR NAME -->
        <div class="form-group">
          <label>SUPERVISOR NAME</label>
          <select id="supervisor">
            <option value="">Select Supervisor</option>
          </select>
        </div>

        <!-- DATES ROW -->
        <div class="form-row">
          <div class="form-group">
            <label>INTERNSHIP START</label>
            <input type="date" id="start_date" onchange="calcWeeks()">
          </div>
          <div class="form-group">
            <label>INTERNSHIP END</label>
            <input type="date" id="end_date" onchange="calcWeeks()">
          </div>
        </div>

        <!-- WEEKS -->
        <div class="form-group">
          <label>DURATION (WEEKS)</label>
          <input type="text" id="weeks" placeholder="Auto-calculated" readonly
            style="background: #f1f5f9; color: #64748b;">
        </div>

        <!-- FOCUSED ON -->
        <div class="form-group">
          <label>PRIMARY FOCUS OF INTERNSHIP</label>
          <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; margin-top: -0.25rem;">What
            specific technologies, skills, or domain did you focus on learning?</div>
          <textarea id="focused_on"
            placeholder="E.g., Focused on learning Machine Learning algorithms, Python backend development, or UI/UX Design principles."></textarea>
        </div>

        <!-- CONTRIBUTED TOWARDS -->
        <div class="form-group">
          <label>KEY CONTRIBUTIONS / PROJECT WORK</label>
          <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; margin-top: -0.25rem;">What
            actual work or project did you actively contribute to during this time?</div>
          <textarea id="contributed_towards"
            placeholder="E.g., Contributed towards developing the core backend API, automated testing scripts, or designing the new dashboard layout."></textarea>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="button" class="btn-submit" id="final-submit-btn" onclick="submitForm()">FINAL SUBMIT</button>

      </div>

    </form>
  </div>

  <!-- Link to external JS -->
  <script src="js/studentform.js?v=8"></script>

</body>

</html>
</body>

</html>
